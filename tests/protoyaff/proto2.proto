syntax = "proto2";

import "yaff/proto/options.proto";

package NTestYaFF;

message TFlatMessage {
    optional uint64 SomeValue1 = 1;
    optional uint64 SomeValue2 = 2;
    optional uint64 SomeValue3 = 3;
    optional uint64 SomeValue4 = 4;
    optional uint64 SomeValue5 = 5;
    optional uint64 SomeValue6 = 6;
    optional uint64 SomeValue7 = 7;
    optional uint64 SomeValue8 = 8;
    optional uint64 SomeValue9 = 9;
    optional uint64 SomeValue10 = 10;
};

message TIntermediateMessage {
    optional TFlatMessage FlatBase = 1;
    optional uint64 SomeValue0 = 2;
};

message THierarchyMessage {
    optional TIntermediateMessage Intermediate = 1;
};

message TSimpleMessage {
    optional sfixed32 SignedField = 1;
    optional uint32 SmallField = 2 [default = 0xAF];
    optional uint64 LargeField = 3 [default = 0x6789];
};

message TSimpleFixedMessage {
    option (yaff.proto.message) = {layout: LAYOUT_FIXED};

    optional uint64 Scalar1 = 1;
    optional int64 Scalar2 = 2;
    optional uint32 Scalar3 = 3;
    optional uint32 Scalar4 = 4;
    optional uint64 Scalar5 = 5 [default = 0xA];
};

message TStaticFixedMessage {
    option (yaff.proto.message) = {layout: LAYOUT_FIXED};

    optional uint64 Scalar = 1;
    optional TSimpleMessage Nested = 2;
};

message TStaticFlatMessage {
    option (yaff.proto.message) = {layout: LAYOUT_FLAT};

    optional uint64 Scalar = 1;
    optional uint32 OtherScalar = 2 [default = 0x5];
    optional TSimpleMessage Nested = 3;
};

message TStaticSparseMessage {
    option (yaff.proto.message) = {layout: LAYOUT_SPARSE};

    optional uint64 Scalar = 1;
    optional TSimpleMessage Nested = 2;
};

message TFloatMessage {
    optional float FloatField = 1 [default = 0.1234];
    optional double DoubleField = 2 [default = 0.000001];
};

message TNestedMessage {
    optional TSimpleMessage Nested1 = 1;
    optional uint64 ScalarField = 2;
    optional TSimpleMessage Nested2 = 3;
};

message TNestedUnused {
    message TMessage {
        optional int32 SomeField = 1;
    }
};

message TVectorMessage {
    repeated uint64 IntegerVec = 1;
    repeated string StringVec = 2;
    repeated TFlatMessage MessageVec = 3;
    repeated bool BoolVec = 4;
    repeated TStaticFixedMessage FixedMessageVec = 5;
};

message TUnionMessage {
    optional uint32 SomeValue = 1;
    oneof Union {
        TSimpleMessage Nested1 = 2;
        string StringVec = 3;
        TSimpleMessage Nested2 = 4;
        int32 MediumField = 5 [default = -1];
        uint64 LargeField = 6;
    }
}

message TAlternativeMessage {
    oneof Alternatives {
        int32 One = 1 [default = -10];
        uint64 Two = 2 [default = 20];
    }
    optional uint64 Three = 3;
}

message TMapMessage {
    message TCompositeValue {
        optional int32 SomeField = 1;
        optional int64 AnotherField = 2;
    }

    map<int32, int32> SimpleMap = 1;
    map<string, TCompositeValue> CompositeMap = 2;
}

message TOneOfMix {
    optional uint64 Field1 = 1 [(yaff.proto.field) = {id: 1}];
    optional uint64 Field2 = 2 [(yaff.proto.field) = {id: 3}];
    oneof Shared {
        uint64 Field3 = 3 [(yaff.proto.field) = {id: 2}];
        uint64 Field4 = 4 [(yaff.proto.field) = {id: 4}];
    }
}

message TGappedMessage {
    optional uint64 Field1 = 1;
    optional uint64 Field3 = 3;
    optional uint64 Field5 = 5;
}
