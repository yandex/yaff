syntax = "proto3";

package test;

enum Enumeration {
    ENUMERATION_UNSPECIFIED = 0;
    ENUMERATION_VALUE = 1;
    ENUMERATION_OTHER_VALUE = 2;
    auto = 3; // Example of keyword as enum name;
}

message UniversalMessage {
    enum EmbeddedEnumeration {
        EMBEDDED_ENUMERATION_UNSPECIFIED = 0;
        EMBEDDED_ENUMERATION_SPECIFIED = 1;
    }
    message EmbeddedMessage { }

    int32 implicit_numeric_field = 1;
    optional int32 explicit_numeric_field_1 = 2;
    optional int32 explicit_numeric_field_2 = 3;

    string implicit_string_field = 4;
    optional string explicit_string_field_1 = 5;
    optional string explicit_string_field_2 = 6;

    bytes implicit_bytes_field = 7;
    optional bytes explicit_bytes_field_1 = 8;
    optional bytes explicit_bytes_field_2 = 9;

    Enumeration implicit_enum_field = 10;
    optional Enumeration explicit_enum_field_1 = 11;
    optional Enumeration explicit_enum_field_2 = 12;

    reserved 13, 14;
    reserved "reserved_field_1", "reserved_field_2";

    // Embedded Message always (in all versions of protobuf) works through explicit presence,
    // so optional label is only here for all version compatibility.
    optional EmbeddedMessage embedded_message_field_1 = 15;
    optional EmbeddedMessage embedded_message_field_2 = 16;

    repeated int32 repeated_numeric_field = 17;
    repeated string repeated_string_field = 18;
    repeated bytes repeated_bytes_field = 19;
    repeated Enumeration repeated_enum_field = 20;
    repeated EmbeddedMessage repeated_embedded_message_field = 21;

    oneof example_name {
        int32 oneof_numeric_field = 22;
        string oneof_string_field = 23;
        bytes oneof_bytes_field = 24;
        Enumeration oneof_enum_field = 25;
        EmbeddedMessage oneof_embedded_message_field = 26;
    }
}
