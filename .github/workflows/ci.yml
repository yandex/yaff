name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          echo 'matrix={"include":[{"os":"ubuntu-latest","compiler":"clang","cc":"clang","cxx":"clang++","conan_compiler":"clang","conan_compiler_version":"17","conan_compiler_libcxx":"libstdc++11"}]}' >> "$GITHUB_OUTPUT"

  cmake-integration:
    name: CMake / ${{ matrix.os }} / ${{ matrix.compiler }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libprotobuf-dev protobuf-compiler libabsl-dev

      - name: Build and install YaFF
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build-yaff -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/yaff-install
          cmake --build build-yaff
          cmake --install build-yaff

      - name: Configure integration_example/cmake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S integration_example/cmake -B build-cmake-example -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/yaff-install

      - name: Build integration_example/cmake
        run: cmake --build build-cmake-example

      - name: Run smoke test
        run: ./build-cmake-example/yaff_smoke

  conan-integration:
    name: Conan / ${{ matrix.os }} / ${{ matrix.compiler }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Override Conan profile compiler
        run: |
          conan profile update settings.compiler=${{ matrix.conan_compiler }} default
          conan profile update settings.compiler.version=${{ matrix.conan_compiler_version }} default
          conan profile update settings.compiler.libcxx=${{ matrix.conan_compiler_libcxx }} default
          conan profile update settings.compiler.cppstd=20 default

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: conan create
        run: |
          conan create . \
            --build=missing \
            -s build_type=Release \
            -tf integration_example/conan
