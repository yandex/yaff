name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  conan-integration:
    name: "Conan / ${{ matrix.os }} / ${{ matrix.compiler }} ${{ matrix.compiler_version }} / ${{ matrix.label }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: clang
            compiler_version: "17"
            cc: clang-17
            cxx: clang++-17
            build_type: Release
            label: Release
            conan_extra: "-o build_tests=True"

          - os: ubuntu-24.04
            compiler: clang
            compiler_version: "17"
            cc: clang-17
            cxx: clang++-17
            build_type: Debug
            label: Debug
            conan_extra: "-o build_tests=True"

          - os: ubuntu-24.04
            compiler: gcc
            compiler_version: "13"
            cc: gcc-13
            cxx: g++-13
            build_type: Release
            label: Release
            conan_extra: "-o build_tests=True"

          - os: ubuntu-24.04
            compiler: gcc
            compiler_version: "13"
            cc: gcc-13
            cxx: g++-13
            build_type: Debug
            label: Debug
            conan_extra: "-o build_tests=True"

    steps:
      - uses: actions/checkout@v4
      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang-${{ matrix.compiler_version }} \
            clang++-${{ matrix.compiler_version }}
      - name: Install GCC
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            gcc-${{ matrix.compiler_version }} \
            g++-${{ matrix.compiler_version }}
      - name: Set CC/CXX
        run: |
          echo "CC=${{ matrix.cc }}"  >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"
      - name: Install CMake
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake
          cmake --version
      - name: Install Conan
        run: |
          python3 -m venv .venv
          .venv/bin/pip install "conan>=2,<3"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.build_type }}-
            conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-
      - name: Detect Conan profile
        run: conan profile detect --force
      - name: Patch Conan profile
        run: |
          PROFILE=$(conan profile path default)
          sed -i.bak "s|compiler=.*|compiler=${{ matrix.compiler }}|"                         "$PROFILE"
          sed -i.bak "s|compiler.version=.*|compiler.version=${{ matrix.compiler_version }}|" "$PROFILE"
          sed -i.bak "s|compiler.libcxx=.*|compiler.libcxx=libstdc++11|"                      "$PROFILE"
          sed -i.bak "s|build_type=.*|build_type=${{ matrix.build_type }}|"                   "$PROFILE"
          echo "=== Profile ===" && cat "$PROFILE"
      - name: conan create
        run: >
          conan create . --build=missing
          -s compiler.cppstd=20
          -s build_type=${{ matrix.build_type }}
          -c tools.cmake:cmake_program=$(which cmake)
          ${{ matrix.conan_extra }}
