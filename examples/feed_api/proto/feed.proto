syntax = "proto3";

package NFeed;

enum EContentType {
    CONTENT_TYPE_UNKNOWN = 0;
    CONTENT_TYPE_ARTICLE = 1;
    CONTENT_TYPE_VIDEO = 2;
    CONTENT_TYPE_PODCAST = 3;
}

message TAuthor {
    uint64 id = 1;
    optional string name = 2;
    optional bool verified = 3;
}

message TFeedItem {
    uint64 item_id = 1;
    optional EContentType content_type = 2;
    optional string title = 3;
    optional string description = 4;
    optional TAuthor author = 5;
    optional double relevance_score = 6;
    repeated string tags = 7;
    map<string, string> extra = 8;

    oneof media {
        string image_url = 9;
        string video_url = 10;
    }
}

message TFeedResponse {
    uint64 request_id = 1;
    repeated TFeedItem items = 2;
}
